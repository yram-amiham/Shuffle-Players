<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <div id="mainContainer" class="container">
      <p class="fs-1 text-center fw-bolder">Game Planner</p>
      <div class="row">
        <div class="col-md-6 text-center">
          <p class="fs-2 fw-medium">Player List</p>
          <table id="list-of-players" class="table table-bordered text-center">
            <thead>
              <tr>
                <th scope="col">No.</th>
                <th scope="col">Names</th>
                <th scope="col">Remove Player</th>
              </tr>
            </thead>
            <tbody id = "table-body">
              <!-- <tr>
                <th scope="row">1</th>
                <td>Mark</td>
                <td>
                  <button type="button" class="btn-close" aria-label="Close"></button>
                </td>
              </tr> -->
            </tbody>
          </table>
        </div>

        <div class="col-md-6">
          <p class="fs-2 fw-medium">Add Players</p>
          <p>Player Name</p>
          <input
            id="player-name"
            type="text"
            class="form-control border border-3"
          />

          <button id="add-player-btn" class="btn btn-primary mt-3">
            Add Player
          </button>
          <button id = "clear-all-players" class="btn btn-secondary mt-3">Clear All</button>

          <p class="fs-2 fw-medium mt-5">Generate Team</p>

          <p>Number of Matches</p>
          <input
            id="match-count"
            type="number"
            class="form-control border border-3"
          />

          <button class="btn btn-success mt-3">Generate Team</button>
        </div>
      </div>
    </div>

    <script src="mix-players.js"></script>
  </body>
</html>
